<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Group — Expense Splitter</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<script src="script.js"></script>
<script>
const currentUser = requireLogin();
const groupId = getActiveGroupId();
if (currentUser && !groupId) window.location.href = 'groups.html';

if (currentUser && groupId) {
  renderShell('groupDetail', getActiveGroupName());
  document.getElementById('pageContent').innerHTML = `
    <a class="back-link link" href="groups.html">← Back to groups</a>
    <div class="page-heading"><h1>${getActiveGroupName()}</h1></div>

    <h3 class="section-label">👥 Members</h3>
    <div id="membersList"></div>
    <div class="card">
      <div class="row-2">
        <input id="newMemberEmail" placeholder="Member's email">
        <button onclick="addMember()">+ Add Member</button>
      </div>
      <p id="addMemberMsg" class="error"></p>
    </div>

    <h3 class="section-label">💰 Expenses</h3>
    <button onclick="openModal('expenseModal')" style="margin-bottom:14px;">+ Add Expense</button>
    <div id="expensesList"></div>

    <h3 class="section-label">📈 Budget</h3>
    <div id="budgetBars"></div>
    <div class="card">
      <p class="muted" style="margin:0 0 10px;">Set or update a category budget</p>
      <select id="budgetCategory"></select>
      <div class="row-3">
        <input id="budgetMonth" type="number" min="1" max="12" placeholder="Month">
        <input id="budgetYear" type="number" placeholder="Year">
        <input id="budgetLimit" type="number" step="0.01" placeholder="Limit">
      </div>
      <p id="budgetError" class="error"></p>
      <button onclick="createBudget()">Save Budget</button>
    </div>

    <h3 class="section-label">💸 Simplified Debts</h3>
    <div id="balancesList"></div>
    <div class="card" style="margin-top:10px;">
      <p class="muted" style="margin:0 0 10px;">Record a settlement</p>
      <div class="row-2">
        <select id="settlePayer"></select>
        <select id="settleReceiver"></select>
      </div>
      <input id="settleAmount" type="number" step="0.01" placeholder="Amount">
      <p id="settleError" class="error"></p>
      <button onclick="recordSettlement()">Record Settlement</button>
    </div>

    <h3 class="section-label">📊 Analytics</h3>
    <div class="stat-grid4" style="grid-template-columns: repeat(3, 1fr);">
      <div class="stat-card2"><div class="stat-icon purple">💲</div><div><div class="s-label">Total Expenses</div><div class="s-value" id="miniTotal">—</div></div></div>
      <div class="stat-card2"><div class="stat-icon blue">🏆</div><div><div class="s-label">Highest Spender</div><div class="s-value" id="miniSpender" style="font-size:15px;">—</div></div></div>
      <div class="stat-card2"><div class="stat-icon orange">🏷️</div><div><div class="s-label">Top Category</div><div class="s-value" id="miniCategory" style="font-size:15px;">—</div></div></div>
    </div>
    <p class="muted"><a class="link" href="analytics.html">See full analytics →</a></p>
  `;

  loadMembers();
  loadExpenses();
  loadBudgetBars();
  loadBalances();
  loadMiniAnalytics();
  loadCategories();
}

let membersCache = [];
</script>

<div class="modal-overlay" id="expenseModal">
  <div class="modal-box">
    <h2>Add Expense</h2>
    <label class="field-label">Description</label>
    <input id="expenseDesc" placeholder="e.g. Dinner">
    <label class="field-label">Amount</label>
    <input id="expenseAmount" type="number" step="0.01" placeholder="0.00">
    <label class="field-label">Currency</label>
    <input id="expenseCurrency" placeholder="e.g. USD">
    <label class="field-label">Category</label>
    <select id="expenseCategory"></select>
    <label class="field-label">Paid by</label>
    <select id="expensePaidBy"></select>
    <div class="checkbox-row">
      <input type="checkbox" id="expenseRecurring">
      <label for="expenseRecurring">Recurring</label>
    </div>
    <label class="field-label">Deadline (optional)</label>
    <input id="expenseDeadline" type="date">
    <label class="field-label">Interest rate % (optional)</label>
    <input id="expenseInterest" type="number" step="0.01" placeholder="0">
    <p id="expenseError" class="error"></p>
    <div class="modal-actions">
      <button class="ghost" onclick="closeModal('expenseModal')">Cancel</button>
      <button onclick="addExpense()">Save</button>
    </div>
  </div>
</div>

<script>
async function loadMembers() {
  const list = document.getElementById('membersList');
  list.innerHTML = '<p class="muted">Loading...</p>';
  try {
    const members = await apiCall(`/groups/${groupId}/members`);
    membersCache = members || [];
    list.innerHTML = '';
    if (membersCache.length === 0) {
      list.innerHTML = '<div class="empty-state">No members found.</div>';
    } else {
      membersCache.forEach(m => {
        const isSelf = m.user_id === currentUser.user_id;
        const div = document.createElement('div');
        div.className = 'list-item';
        div.innerHTML = `
          <div><div class="title">${m.name}${isSelf ? ' (you)' : ''}</div><div class="meta">${m.email || ''}</div></div>
          ${isSelf ? '' : `<button class="danger small" onclick="removeMember(${m.user_id})">Remove</button>`}
        `;
        list.appendChild(div);
      });
    }
    populateDropdowns();
  } catch (err) {
    list.innerHTML = `<div class="empty-state">Could not load members: ${err.message}</div>`;
  }
}

async function addMember() {
  const email = document.getElementById('newMemberEmail').value.trim();
  const msgEl = document.getElementById('addMemberMsg');
  msgEl.className = 'error'; msgEl.innerText = '';
  if (!email) { msgEl.innerText = 'Enter an email address.'; return; }

  try {
    const found = await apiCall(`/users/lookup?email=${encodeURIComponent(email)}`).catch(() => null);
    if (!found) { msgEl.innerText = "No account found with that email."; return; }
    await apiCall(`/groups/${groupId}/members`, { method: 'POST', body: JSON.stringify({ user_id: found.user_id }) });
    document.getElementById('newMemberEmail').value = '';
    msgEl.className = 'success'; msgEl.innerText = `${found.name} added.`;
    loadMembers();
  } catch (err) {
    msgEl.className = 'error'; msgEl.innerText = err.message;
  }
}

async function removeMember(userId) {
  if (!confirm('Remove this member from the group?')) return;
  try {
    await apiCall(`/groups/${groupId}/members/${userId}`, { method: 'DELETE' });
    loadMembers();
  } catch (err) { alert('Could not remove: ' + err.message); }
}

function populateDropdowns() {
  const payerSel = document.getElementById('settlePayer');
  const receiverSel = document.getElementById('settleReceiver');
  const paidBySel = document.getElementById('expensePaidBy');
  payerSel.innerHTML = ''; receiverSel.innerHTML = ''; paidBySel.innerHTML = '';
  membersCache.forEach(m => {
    payerSel.innerHTML += `<option value="${m.user_id}">${m.name}</option>`;
    receiverSel.innerHTML += `<option value="${m.user_id}">${m.name}</option>`;
    paidBySel.innerHTML += `<option value="${m.user_id}" ${m.user_id === currentUser.user_id ? 'selected' : ''}>${m.name}</option>`;
  });
}

async function loadCategories() {
  const expSel = document.getElementById('expenseCategory');
  const budgetSel = document.getElementById('budgetCategory');
  expSel.innerHTML = '<option value="">No category</option>';
  budgetSel.innerHTML = '';
  try {
    const categories = await apiCall('/categories').catch(() => []);
    (categories || []).forEach(c => {
      expSel.innerHTML += `<option value="${c.category_id}">${c.category_name}</option>`;
      budgetSel.innerHTML += `<option value="${c.category_id}">${c.category_name}</option>`;
    });
  } catch (err) {}
}

async function addExpense() {
  const description = document.getElementById('expenseDesc').value.trim();
  const total_amount = document.getElementById('expenseAmount').value;
  const original_currency = document.getElementById('expenseCurrency').value.trim();
  const category_id = document.getElementById('expenseCategory').value || null;
  const user_id = document.getElementById('expensePaidBy').value || currentUser.user_id;
  const is_recurring = document.getElementById('expenseRecurring').checked;
  const settle_by_deadline = document.getElementById('expenseDeadline').value || null;
  const interest_rate = document.getElementById('expenseInterest').value || 0;
  const errorEl = document.getElementById('expenseError');
  errorEl.innerText = '';
  if (!description || !total_amount || !original_currency) { errorEl.innerText = 'Fill in description, amount, and currency.'; return; }

  try {
    await apiCall(`/groups/${groupId}/expenses`, {
      method: 'POST',
      body: JSON.stringify({ user_id, category_id, description, total_amount, original_currency, is_recurring, settle_by_deadline, interest_rate })
    });
    ['expenseDesc','expenseAmount','expenseCurrency','expenseDeadline','expenseInterest'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('expenseRecurring').checked = false;
    closeModal('expenseModal');
    loadExpenses(); loadBalances(); loadMiniAnalytics(); loadBudgetBars();
  } catch (err) {
    errorEl.innerText = err.message;
  }
}

async function loadExpenses() {
  const list = document.getElementById('expensesList');
  list.innerHTML = '<p class="muted">Loading...</p>';
  try {
    const expenses = await apiCall(`/groups/${groupId}/expenses`);
    const arr = Array.isArray(expenses) ? expenses : [];
    if (arr.length === 0) { list.innerHTML = '<div class="empty-state">No expenses logged yet.</div>'; return; }
    list.innerHTML = arr.map(e => `
      <div class="list-item">
        <div><div class="title">${e.description}</div><div class="meta">${new Date(e.created_at).toLocaleDateString()}</div></div>
        <div style="display:flex; align-items:center; gap:10px;">
          <div class="title">${Number(e.total_amount).toFixed(2)} ${e.original_currency}</div>
          <button class="danger small" onclick="deleteExpense(${e.expense_id})">Delete</button>
        </div>
      </div>
    `).join('');
  } catch (err) {
    list.innerHTML = `<div class="empty-state">Could not load expenses: ${err.message}</div>`;
  }
}

async function deleteExpense(id) {
  if (!confirm('Delete this expense?')) return;
  try {
    await apiCall(`/expenses/${id}`, { method: 'DELETE' });
    loadExpenses(); loadBalances(); loadMiniAnalytics(); loadBudgetBars();
  } catch (err) { alert('Could not delete: ' + err.message); }
}

async function createBudget() {
  const category_id = document.getElementById('budgetCategory').value;
  const month = document.getElementById('budgetMonth').value;
  const year = document.getElementById('budgetYear').value;
  const monthly_limit = document.getElementById('budgetLimit').value;
  const errorEl = document.getElementById('budgetError');
  errorEl.innerText = '';
  if (!category_id || !month || !year || !monthly_limit) { errorEl.innerText = 'Fill in every field.'; return; }

  try {
    await apiCall(`/groups/${groupId}/budgets`, { method: 'POST', body: JSON.stringify({ category_id, month, year, monthly_limit }) });
    document.getElementById('budgetMonth').value = '';
    document.getElementById('budgetYear').value = '';
    document.getElementById('budgetLimit').value = '';
    loadBudgetBars();
  } catch (err) {
    errorEl.innerText = err.message;
  }
}

async function loadBudgetBars() {
  const container = document.getElementById('budgetBars');
  container.innerHTML = '<p class="muted">Loading...</p>';
  try {
    const budgets = await apiCall(`/groups/${groupId}/budgets`);
    const arr = Array.isArray(budgets) ? budgets : [];
    if (arr.length === 0) { container.innerHTML = '<div class="empty-state">No budgets set yet.</div>'; return; }

    let alerts = [];
    try { alerts = await apiCall(`/api/v1/analytics/budget-alerts?group_id=${groupId}`); } catch (e) { alerts = []; }
    const alertIds = new Set((alerts || []).map(a => a.budget_id));

    container.innerHTML = arr.map(b => {
      const spent = Number(b.spent || 0);
      const limit = Number(b.monthly_limit || 1);
      const pct = Math.min((spent / limit) * 100, 100);
      const over = alertIds.has(b.budget_id) || spent >= limit * 0.8;
      return `
        <div class="progress-row">
          <div class="pr-top"><span class="pr-label">${b.category_name || 'Category'}</span><span class="pr-value">${spent.toFixed(0)} / ${limit.toFixed(0)}</span></div>
          <div class="progress-track"><div class="progress-fill ${over ? 'over' : ''}" style="width:${pct}%"></div></div>
        </div>
      `;
    }).join('');
  } catch (err) {
    container.innerHTML = `<div class="empty-state">${err.message}</div>`;
  }
}

async function recordSettlement() {
  const payer_id = document.getElementById('settlePayer').value;
  const receiver_id = document.getElementById('settleReceiver').value;
  const amount = document.getElementById('settleAmount').value;
  const errorEl = document.getElementById('settleError');
  errorEl.innerText = '';
  if (!payer_id || !receiver_id || !amount) { errorEl.innerText = 'Fill in payer, receiver, and amount.'; return; }
  if (payer_id === receiver_id) { errorEl.innerText = 'Payer and receiver must differ.'; return; }

  try {
    await apiCall(`/groups/${groupId}/settlements`, { method: 'POST', body: JSON.stringify({ payer_id, receiver_id, amount }) });
    document.getElementById('settleAmount').value = '';
    loadBalances();
  } catch (err) {
    errorEl.innerText = err.message;
  }
}

async function loadBalances() {
  const list = document.getElementById('balancesList');
  list.innerHTML = '<p class="muted">Loading...</p>';
  try {
    const balances = await apiCall(`/groups/${groupId}/debts/simplified`);
    const arr = Array.isArray(balances) ? balances : [];
    if (arr.length === 0) { list.innerHTML = '<div class="empty-state">No balance data yet.</div>'; return; }
    list.innerHTML = arr.map(b => {
      const net = Number(b.total_paid || 0) - Number(b.total_owed || 0);
      const label = net >= 0 ? `<span class="balance-paid">is owed ${net.toFixed(2)}</span>` : `<span class="balance-owed">owes ${Math.abs(net).toFixed(2)}</span>`;
      return `<div class="list-item"><div class="title">${b.name}</div><div>${label}</div></div>`;
    }).join('');
  } catch (err) {
    list.innerHTML = `<div class="empty-state">Could not load balances: ${err.message}</div>`;
  }
}

async function loadMiniAnalytics() {
  try {
    const summary = await apiCall(`/api/v1/analytics/group-summary?group_id=${groupId}`);
    document.getElementById('miniTotal').innerText = Number(summary.total_spent || 0).toFixed(2);
  } catch (e) { document.getElementById('miniTotal').innerText = '—'; }
  try {
    const contributions = await apiCall(`/api/v1/analytics/member-contributions?group_id=${groupId}`);
    const top = (contributions || [])[0];
    document.getElementById('miniSpender').innerText = top ? top.name : '—';
  } catch (e) { document.getElementById('miniSpender').innerText = '—'; }
  try {
    const categories = await apiCall(`/api/v1/analytics/category-breakdown?group_id=${groupId}`);
    const sorted = (categories || []).sort((a, b) => Number(b.total) - Number(a.total));
    document.getElementById('miniCategory').innerText = sorted[0] ? sorted[0].category_name : '—';
  } catch (e) { document.getElementById('miniCategory').innerText = '—'; }
}
</script>
</body>
</html>
